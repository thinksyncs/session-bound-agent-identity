name: HAL Definition Check

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/hal.yml"
      - "hal/linux/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/hal.yml"
      - "hal/linux/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate HAL external tree files
        run: |
          test -f hal/linux/external.desc
          test -f hal/linux/external.mk
          test -f hal/linux/Config.in
          test -f hal/linux/configs/cocos_defconfig
          test -d hal/linux/package
          test -d hal/linux/board/cocos

      - name: Check release workflow is disabled
        run: |
          release_action="softprops/action-gh-"
          release_action="${release_action}release"
          upstream_owner="ultravioletrs"
          upstream_repo="${upstream_owner}/cocos"
          tag_trigger="ta"
          tag_trigger="${tag_trigger}gs:"

          ! grep -R "$release_action" .github/workflows/hal.yml
          ! grep -R "$upstream_repo" .github/workflows/hal.yml
          ! grep -R "$tag_trigger" .github/workflows/hal.yml
