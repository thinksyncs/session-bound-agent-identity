name: Security Red Team

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/security-red-team.yaml"
      - "go.mod"
      - "go.sum"
      - "pkg/agtp/**"
      - "pkg/atls/**"
      - "pkg/clients/**"
      - "docs/security-red-team-tests.md"
      - "docs/live-red-team-report.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/security-red-team.yaml"
      - "go.mod"
      - "go.sum"
      - "pkg/agtp/**"
      - "pkg/atls/**"
      - "pkg/clients/**"
      - "docs/security-red-team-tests.md"
      - "docs/live-red-team-report.md"

permissions:
  contents: read

jobs:
  live-red-team:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
          cache-dependency-path: go.sum

      - name: Run AGTP/aTLS live red-team tests
        run: |
          GOTOOLCHAIN=go1.26.0+auto go test -v -race -count=1 \
            ./pkg/agtp \
            ./pkg/atls/identitypolicy \
            ./pkg/clients
